name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            artifact: LanguageBubble-win-x64
          - target: aarch64-pc-windows-msvc
            artifact: LanguageBubble-win-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: LanguageBubble
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: link.exe
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: ""
          CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER: link.exe
          CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_RUSTFLAGS: ""

      - name: Rename artifact
        run: |
          Copy-Item "LanguageBubble/target/${{ matrix.target }}/release/language-bubble.exe" "${{ matrix.artifact }}.exe"
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
